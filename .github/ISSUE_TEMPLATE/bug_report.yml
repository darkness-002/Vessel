name: Bug Report
description: Report a bug to help us improve Vessel
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How do we trigger this bug?
      placeholder: |
        1. Open App 'X'
        2. Click on 'Y'
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Vessel Version
      description: Which version of Vessel are you using? (e.g., 0.1.0)
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true
